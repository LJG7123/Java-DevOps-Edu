<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>
	<body>
		<h1>async와 await 사용하기 - 하나 둘 셋</h1>
		<script>
			const taskA = () => {
				return new Promise((resolve, reject) => {
					setTimeout(() => {
						resolve("하나");
						// reject("A 에러");
					}, 2000);
				});
			};
			const taskB = (param) => {
				console.log(param);
				return new Promise((resolve, reject) => {
					setTimeout(() => {
						resolve("둘");
						// reject("B 에러");
						// reject(new Error("B 작업 중 에러 발생"));
					}, 1000);
				});
			};
			const taskC = (param) => {
				console.log(param);
				return new Promise((resolve, reject) => {
					setTimeout(() => {
						resolve("셋");
						// reject("C 에러");
					}, 1500);
				});
			};

			const test = async () => {
				try {
					const a = await taskA();
					console.log("a: " + a);
					const b = await taskB(a);
					console.log("b: " + b);
					const c = await taskC(b);
					console.log("c: " + c);
				} catch (e) {
					console.log(e);
				} finally {
					console.log("완료");
				}
			};

			const t = test();
			console.log(t);
		</script>
	</body>
</html>
