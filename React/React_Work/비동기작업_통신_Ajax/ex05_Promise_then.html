<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>
	<body>
		<h1>Promise then 사용하기 - (하나 둘 셋)</h1>
		<script>
			console.log("----시작----");

			const taskA = () => {
				return new Promise((resolve, reject) => {
					setTimeout(() => {
						resolve("하나");
						// reject("A 에러");
					}, 2000);
				});
			};
			const taskB = () => {
				return new Promise((resolve, reject) => {
					setTimeout(() => {
						// resolve("둘");
						// reject("B 에러");
						reject(new Error("B 작업 중 에러 발생"));
					}, 1000);
				});
			};
			const taskC = () => {
				return new Promise((resolve, reject) => {
					setTimeout(() => {
						resolve("셋");
						// reject("C 에러");
					}, 1500);
				});
			};

			taskA()
				.then((result) => {
					console.log("taskA = " + result);
					return taskB();
				})
				.then((result) => {
					console.log("taskB = " + result);
					return taskC();
				})
				.then((result) => {
					console.log("taskC = " + result);
				})
				.catch((e) => console.log(e))
				.finally(() => console.log("완료"));

			console.log("----END----");
		</script>
	</body>
</html>
