<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>변수에 대해서 알아보자 - (var - ES5 이전) vs (let vs const -ES6)</h1>
    <script>
      /*
        변수 선언 - 선언할 때 var 생략도 가능
        var 변수이름;
        var 변수이름 = 값;
        */

      var a;
      var b = 20;
      c = 3.14;
      document.write("<h4>");
      document.write("a = " + a + ", " + typeof a + "<br>");
      document.write("b = " + b + ", " + typeof b + "<br>");
      document.write("c = " + c + ", " + typeof c + "<br>");
      document.write("<hr/>");
      a = "안녕하세요";
      b = [1, "hi", 3.14, true];
      c = false;
      document.write("a = " + a + ", " + typeof a + "<br>");
      document.write("b = " + b + ", " + typeof b + "<br>");
      document.write("c = " + c + ", " + typeof c + "<br>");
      document.write("<hr/>");
      // let a = "졸지말아요~";
      document.write("a = " + a + ", " + typeof a + "<br>");
      // document.write("age = " + age + ", " + typeof age + "<br>");

      let age = 20;
      document.write("age = " + age + ", " + typeof age + "<hr>");
      document.write("</h4>");

      //자바스크립트에서 변수의 scope에 대해 알아보자
      document.write("<h1>변수의 scope에 대해 알아보자</h1>");
      var i = 10;
      function test2() {
        let i = 5; // 지역변수
        let j = 20; // 지역변수
        let k = 50; // 함수 안에서 선언되는 변수에 var를 생략하면 전역변수
        console.log("i = " + i);
        console.log("this.i = " + this.i);
        console.log("j = " + j);
        console.log("k = " + k);
      }

      function test3() {
        console.log("i = " + i);
        console.log("this.i = " + this.i);
        // console.log("j = " + j);
        // console.log("k = " + k);

        // console.log("전 : index = " + index);
        for (let index = 0; index <= 10; index++) {}

        // console.log("후 : index = " + index);

        // console.log("전 : nickname = " + nickname);
        {
          let nickname = "정건";
        }
        // console.log("후 : nickname = " + nickname);
      }

      test2();
      test3();

      // 함수를 선언적 함수 스타일이 아닌 표현식으로 선언을 하면
      // 중복되는 함수이름을 사용할 수 없다!
      let test04 = function () {
        alert("출력되나요?");
      };

      // test04();

      // 함수나 배열, 객체는 let 대신에 const를 사용한다
      const test05 = function () {
        console.log("test05 call");
      };
      test05();

      let addr;
      addr = "분당";

      // const message;
      const message = "뭐먹지?";
      // message = "값변경";

      const person = {
        name: "정건",
        age: 20,
      };

      console.log(person.name);
      console.log(person.age);
      person.name = "효리";

      /*let의 선언한 변수를 또 선언할수 있는지? - x
    선언전에 사용할수 있는지? - x
       Uncaught ReferenceError: Cannot access 'd' before initialization
       let 변수도 호이스팅이 되지만 값을 할당하기전에는 사용불가하하다.
       TDZ(Temporal Dead Zone) 이라고 한다. - 변수의 선언과 변수의 초기화 사이의 변수에 접근 할수 없는 지점
       즉, 초기화되지 않은 변수가 있는 곳을 Temporal Dead Zone 이라고 한다.

     let 변수의 scope 블럭레벨 scope이 된다!!

     함수를 선언할때 선언적 함수가 아닌 함수표현식으로 작성하게되면
     동일한 이름의 함수를 단 한개 만 만들수 있다!
     함수표현식으로 작성한 함수는 선언전에 호출 할 수없다!!

     const는 상수로 반드시 선언과 동시에 값을 할당해야하고 한번  초기화 되고나면
     값변경이 불가하다. - const는 주로 함수 , 객체들을 const에 저장을 한다.*/
    </script>
  </body>
</html>
