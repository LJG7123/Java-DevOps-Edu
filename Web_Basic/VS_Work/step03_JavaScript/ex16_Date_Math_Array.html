<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <h2>Date, Math, Array 객체 알아보기</h2>
        <script>
            const today = new Date(2025, 9, 3);

            // 난수발생
            let n = parseInt(Math.random() * 5) + 1;
            console.log(n);

            // 배열
            const arr1 = [];
            const arr2 = new Array(1, true, "졸리다.");
            const arr3 = [2, 4, 6, 8, true];
            const arr4 = [
                [1, 2, 3],
                [, 3, 6, 9, 14],
                ["A", "B"],
                [true, false, 3.14],
            ];
            const arr5 = [
                { name: "희정", age: 20 },
                { name: "나영", age: 24 },
                { name: "미미", age: 20 },
            ];
            console.log("============");
            console.log(arr1);
            console.log(arr2);
            console.log(arr3);
            console.log(arr4);
            console.log(arr5);
        </script>
    </body>
</html>
