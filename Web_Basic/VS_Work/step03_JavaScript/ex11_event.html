<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <script>
            /**
             * 이벤트 등록방법
             * 1) 태그에 속성으로 on이벤트종류="기능"
             * 2) javascript에서 element를 찾아서 등록
             *      - 이벤트주체.on이벤트이름=함수
             *          => 이벤트 종류는 모두 소문자이다!
             *              함수이름 옆에 () 붙이면 안된다
             *
             *      - 이벤트주체.addEventListener(이벤트종류, 함수, true|false);
             *          => 이벤트 종류는 소문자이다. / on은 붙이면 안된다
             *          => true: 버블링 방식 / false: 캡쳐링 방식
             *              : 이벤트 전이가 버블링인지 캡쳐링인지를 3번째 인수가 결정
             *              : IE는 false만 지원
             */
            /**
             * body에 마크업된 element를 찾는 방법
             * 1) id로 찾기
             *      document.getElementById("아이디"); - 결과가 무조건 하나의 element
             *
             * 2) class 속성으로 찾기 - document.getElementsByClassName("클래스이름");
             * 3) 태그 이름으로 찾기 - document.getElementsByTagName("클래스이름");
             * 4) name으로 찾기 - document.getElementsByName("클래스이름");
             * 2, 3, 4인 경우는 결과가 배열로 나온다(NodeList) (index관리 필수)
             *
             * 5) selector = 선택자를 이용해서 찾기
             *      document.querySelector("selector"); - 결과가 한개
             *      document.querySelectorALl("selector"); - 결과가 한개 이상
             */

            const test01 = (th) => {
                console.log("클릭1 눌렸어요.");
                console.log(th);
                th.style.color = "red";
            };

            const test02 = function () {
                console.log("클릭2 눌렸어요.");
                let et = event.target;
                // console.log(et);
                et.style.border = "solid red 3px";
            };

            onload = function () {
                // let btn2 = document.getElementById("btn2");
                let btn2 = document.querySelector("#btn2");
                btn2.onclick = test02;

                let btnList = document.querySelectorAll("button");
                console.log(btnList);

                // btnList[2].addEventListener("click", test02, false);
                btnList[2].addEventListener(
                    "click",
                    function () {
                        event.target.style.fontSize = "30px";
                    },
                    false,
                );
                document
                    .querySelectorAll("button")
                    .forEach(function (ele, index) {
                        // console.log(index + ", " + ele);
                        ele.onmouseover = () => {
                            event.target.style.width = "300px";
                            event.target.style.height = "100px";
                        };

                        ele.addEventListener(
                            "mouseout",
                            function () {
                                event.target.style.width = "100px";
                                event.target.style.height = "30px";
                            },
                            false,
                        );
                    });
            };
        </script>
    </head>
    <body>
        <h2>이벤트 처리하기</h2>
        <button onclick="test01(this)">"클릭1"</button><br /><br />
        <button id="btn2">"클릭2"</button><br /><br />
        <button>"클릭3"</button><br /><br />
        <button>"클릭4"</button><br /><br />
    </body>
</html>
