<!doctype html>
<html>
    <head>
        <title>New Document</title>
        <meta charset="utf-8" />
        <script type="text/javascript">
            onload = function () {
                // img를 1초마다 갱신
                let imgList = [
                    "img/monkey.gif",
                    "img/cat.gif",
                    "img/dog.gif",
                    "img/lion.gif",
                ];
                let idx = 0;
                const imgChange = function () {
                    document.images[0].src = imgList[idx++];
                    if (idx >= imgList.length) idx %= imgList.length;
                };
                let intervalId = setInterval(imgChange, 1000);

                document.querySelectorAll("span").forEach((spanEle) => {
                    console.log(spanEle);
                    spanEle.addEventListener(
                        "click",
                        function () {
                            // 현재 클릭된 span에 따라 첫번째 이미지 src속성을 변경한다
                            // console.log(event.target);
                            // console.log(this);
                            let imgName = this.dataset.imgName;
                            document.images[0].src = "./img/" + imgName;
                        },
                        false,
                    );
                });

                document
                    .querySelectorAll("[class=imgOverOut]")
                    .forEach((imgEle) => {
                        imgEle.addEventListener(
                            "mouseover",
                            function () {
                                this.width *= 1.5;
                                this.height *= 1.5;
                            },
                            false,
                        );
                        imgEle.addEventListener(
                            "mouseout",
                            function () {
                                this.width /= 1.5;
                                this.height /= 1.5;
                            },
                            false,
                        );
                    });

                document.images[0].addEventListener(
                    "mouseover",
                    () => {
                        if (intervalId) clearInterval(intervalId);
                    },
                    false,
                );
                document.images[0].addEventListener(
                    "mouseout",
                    () => {
                        intervalId = setInterval(imgChange, 1000);
                    },
                    false,
                );
            };
        </script>
    </head>

    <body>
        <img src="img/cat.gif" /><br /><br />

        <span data-img-name="monkey.gif">[ 원숭이 ]</span> &nbsp;&nbsp;
        <span data-img-name="lion.gif">[ 사자 ]</span> &nbsp;&nbsp;
        <span data-img-name="cat.gif">[ 고양이 ]</span> &nbsp;&nbsp;
        <span data-img-name="dog.gif">[ 강아지 ]</span> &nbsp;&nbsp;

        <hr color="red" />

        <img
            src="img/monkey.gif"
            width="70"
            height="60"
            class="imgOverOut"
        />&nbsp;&nbsp;
        <img
            src="img/cat.gif"
            width="70"
            height="60"
            class="imgOverOut"
        />&nbsp;&nbsp;
        <img
            src="img/dog.gif"
            width="70"
            height="60"
            class="imgOverOut"
        />&nbsp;&nbsp;
        <img
            src="img/lion.gif"
            width="70"
            height="60"
            class="imgOverOut"
        />&nbsp;&nbsp;
    </body>
</html>
