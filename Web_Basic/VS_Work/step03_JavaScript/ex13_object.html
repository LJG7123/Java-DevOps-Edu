<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <h1>Object key와 value</h1>
        <script>
            const person = {
                name: "정건",
                age: 20,
                print: function () {
                    return this.name + "님 나이는 " + this.age + "살입니다.";
                },
            };

            console.log(person);
            console.log(person.name);
            console.log(person.age);
            console.log(person["age"]);
            console.log(person.print());

            let keys = Object.keys(person);
            console.log(keys);

            let values = Object.values(person);
            console.log(values);

            for (let key of keys) {
                console.log(key + ": " + person[key]);
            }
        </script>
    </body>
</html>
