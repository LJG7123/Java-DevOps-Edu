<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>
	<body>
		<h1>Optional Chaining 문법 - ?.</h1>
		<!-- 객체의 속성이나 메소드에 안전하게 접근하기 위한 문법
	 : 중첩된 객체 구조에서 존재하지 않는 속성에 접근해도 오류가 발생하지 않고
	 undefined를 반환하도록 하는 것 -->
		<script>
			const person1 = {
				name: "hee",
				job: {
					title: "instructor",
					manager: {
						name: "kim",
					},
				},
			};

			const person2 = {
				name: "jang",
			};

			const print = function (p) {
				// p의 manager 정보를 조회
				// console.log(p.job.manager.name);

				/*if (p) {
						if (p.job) {
							if (p.job.manager) {
								console.log(p.job.manager.name);
							}
						}
				}*/

				// && 또는 || 특징을 이용해서 작성
				// p && p.job && p.job.manager && console.log(p.job.manager.name);

				console.log(p?.job?.manager?.name);
			};

			print(person1);
			print(person2);
		</script>
	</body>
</html>
