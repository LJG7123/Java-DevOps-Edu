<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>
	<body>
		<h1>this 개념 - 호출한 주체에 의해 this가 결정된다</h1>
		<button id="btn1">클릭1</button>
		<button id="btn2">클릭2</button>
		<button id="btn3">클릭3</button>
		<button id="btn4">클릭4</button>

		<script>
			console.log(this);

			const student = {
				name: "hee",
				print: function () {
					console.log(this);
					console.log(this.name);
				},
			};

			// print 호출
			student.print();
			console.log("---------------------");
			const printName = student.print;
			printName();

			console.log("---------------------");
			document.getElementById("btn1").addEventListener("click", student.print);
			document.getElementById("btn2").addEventListener("click", printName);
			document.getElementById("btn3").addEventListener("click", function (e) {
				console.log("*********************");
				console.log(this);
				console.log(event.target);
				console.log(e.target);
				console.log("*********************");
			});
			document.getElementById("btn4").addEventListener("click", (e) => {
				console.log("*********************");
				console.log(this);
				console.log(event.target);
				console.log(e.target);
				console.log("*********************");
			});
		</script>
	</body>
</html>
