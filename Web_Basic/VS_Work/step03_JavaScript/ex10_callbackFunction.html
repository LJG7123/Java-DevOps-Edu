<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <h2>callback함수 알아보기</h2>
        <script>
            // 두 수를 전달받아서 더하기 하는 함수
            const add = (a, b) => {
                return a + b;
            };

            // 빼는 함수
            const minus = (a, b) => a - b;

            // 출력 함수
            const print = (a, b, operator) => {
                let resullt;
                if (operator === "+") {
                    result = add(a, b);
                } else if (operator === "-") {
                    result = minus(a, b);
                }

                console.log(`${a} ${operator} ${b} = ${result}`);
            };

            print(5, 3, "+");
            print(5, 3, "-");

            const print2 = (a, b, op) => {
                // op에 함수 전달
                let result = op(a, b);
                console.log(`${a} ${b} = ${result}`);
            };

            print2(5, 3, add);
            print2(5, 3, minus);
            print2(5, 3, (a, b) => a * b);
            print2(5, 3, (a, b) => {
                console.log("나누기");
                return a / b;
            });
        </script>
    </body>
</html>
