<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <h2>Array 함수</h2>
        <script>
            const students = [
                { name: "A", age: 20, state: true, score: 80 },
                { name: "B", age: 29, state: true, score: 85 },
                { name: "C", age: 22, state: false, score: 90 },
                { name: "D", age: 21, state: true, score: 45 },
                { name: "E", age: 28, state: false, score: 95 },
            ];
            //1. 점수가 90점인 학생 정보 - find()
            console.log(students.find((s) => s["score"] === 90));
            //2. 점수가 90점인 이상인 모든 학생 - filter()
            console.log(students.filter((s) => s.score >= 90));
            //3. 수강중(state-true) 학생들만 골라서 배열로 만들기. - filter()
            console.log(students.filter((s) => s.state));
            //4.학생 배열에서 점수만 뽑아서 배열로 만들기 - map()
            console.log(students.map((s) => s.score));
            //5.학생 들중에 점수가 50점 보다 낮은 친구 있는지 없는지 체크하기-some()
            console.log(students.some((s) => s.score < 50));
            //6. 모든 학생들의 점수가 80이상인지 체크 -every()
            console.log(students.every((s) => s.score >= 80));
            //7.학생들의 평균점수를 구하기 - reduce()
            console.log(
                students.reduce((pre, cur) => pre + cur.score, 0) /
                    students.length,
            );
            //8. 학생들의 모든 점수를 구해서 하나의 string으로 변환(map , join)
            console.log(students.map((s) => s.score).join(", "));
            //9.학생들의 모든 점수를 배열로 만들어서 50점 이상인 학생들만 뽑아서 하나의 string으로 변환(map, filter, join);
            console.log(
                students
                    .map((s) => s.score)
                    .filter((s) => s >= 50)
                    .join(", "),
            );
            //10.학생들의 점수를 정렬하기. - sort()
            console.log(students.sort((s1, s2) => s1.score - s2.score));
        </script>
    </body>
</html>
