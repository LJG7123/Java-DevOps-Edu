<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      table {
        width: 300px;
        height: 200px;
        border: 1px solid red;
      }
      th,
      td {
        border: 1px dotted blue;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <table>
      <caption>
        8행3열
      </caption>
      <tbody align="center">
        <tr>
          <td colspan="3">A</td>
        </tr>
        <tr>
          <td rowspan="3">b</td>
          <td colspan="2">c</td>
        </tr>
        <tr>
          <td>d</td>
          <td>e</td>
        </tr>
        <tr>
          <td>f</td>
          <td>g</td>
        </tr>
        <tr>
          <td colspan="3">h</td>
        </tr>
        <tr>
          <td rowspan="3">i</td>
          <td>j</td>
          <td>k</td>
        </tr>
        <tr>
          <td>e</td>
          <td>f</td>
        </tr>
        <tr>
          <td>g</td>
          <td>h</td>
        </tr>
      </tbody>
    </table>

    <hr />
    <table>
      <caption>
        선물용과 가정용 상품 구성
      </caption>
      <thead>
        <tr>
          <th>용도</th>
          <th>중량</th>
          <th>갯수</th>
          <th>가격</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td rowspan="2">선물용</td>
          <td>3kg</td>
          <td>11~16과</td>
          <td>35,000원</td>
        </tr>
        <tr>
          <td>5kg</td>
          <td>18~26과</td>
          <td>52,000원</td>
        </tr>
        <tr>
          <td rowspan="2">가정용</td>
          <td>3kg</td>
          <td>11~16과</td>
          <td>30,000원</td>
        </tr>
        <tr>
          <td>5kg</td>
          <td>18~26과</td>
          <td>47,000원</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
