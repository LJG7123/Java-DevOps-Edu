<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <style>
            table {
                border: 1px red double;
                border-width: 3px;
                border-collapse: collapse;
                text-align: center;
            }
            th,
            td {
                padding: 10px 20px;
                border: 1px gray solid;
            }
            td:nth-child(1) {
                width: 60px;
            }
        </style>
    </head>
    <body>
        <script>
            let name = prompt("이름을 입력하세요.");
            let kor = prompt("국어 점수를 입력하세요.");
            let eng = prompt("영어 점수를 입력하세요.");
            let math = prompt("수학 점수를 입력하세요.");

            let total = parseInt(kor) + parseInt(eng) + parseInt(math);
            let avg = total / 3;
            let grade =
                avg > 90
                    ? "수"
                    : avg > 80
                      ? "우"
                      : avg > 70
                        ? "미"
                        : avg > 60
                          ? "양"
                          : "가";

            document.write("<table>");
            document.write("<caption>성적표</caption>");
            document.write("<tr>");
            document.write("<th>이름</th>");
            document.write("<th>국어</th>");
            document.write("<th>영어</th>");
            document.write("<th>수학</th>");
            document.write("<th>총점</th>");
            document.write("<th>평균</th>");
            document.write("<th>등급</th>");
            document.write("</tr>");

            document.write("<tr>");
            document.write(`<td>${name}</td>`);
            document.write(`<td>${kor}</td>`);
            document.write(`<td>${eng}</td>`);
            document.write(`<td>${math}</td>`);
            document.write(`<td>${total}</td>`);
            document.write(`<td>${avg}</td>`);
            document.write(`<td>${grade}</td>`);
            document.write("</tr>");

            document.write("</table>");
        </script>
    </body>
</html>
