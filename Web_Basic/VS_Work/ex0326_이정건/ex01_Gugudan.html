<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <style>
            table {
                border: 2px red solid;
                border-collapse: collapse;
            }
            th {
                border: 1px gray solid;
                background-color: pink;
                color: white;
            }
            td {
                border: 1px gray solid;
                text-align: center;
            }
        </style>
        <script>
            document.write("<table><caption>구구단</caption>");
            for (r = 0; r <= 9; r++) {
                document.write("<tr>");
                for (c = 2; c <= 9; c++) {
                    if (r == 0) {
                        document.write(`<th>${c}단</th>`);
                    } else {
                        document.write(`<td>${c} * ${r} = ${r * c}</td>`);
                    }
                }
                document.write("</tr>");
            }
            document.write("</table>");
        </script>
    </head>
    <body></body>
</html>
