<!doctype html>
<html>
	<head>
		<meta charset="EUC-KR" />
		<title>Insert title here</title>
		<style type="text/css">
			table {
				width: 400px;
				border: 1px red solid;
			}
			td,
			th {
				border: 1px gray solid;
			}
			a {
				text-decoration: none;
			}
		</style>
	</head>
	<body>
		<h1>테이블 동적으로 생성하기</h1>
		<a href="#" id="add">추가하기</a>

		<table id="table">
			<tr>
				<th>이름</th>
				<th>나이</th>
				<th>삭제하기</th>
			</tr>
			<!-- 동적으로 tr 추가 또는 제거  -->
		</table>
	</body>

	<script>
		let rowCount = 0;
		document.getElementById("add").addEventListener(
			"click",
			function () {
				let table = document.querySelector("#table");

				let row = table.insertRow();
				row.insertCell(0).innerHTML = "<input type='text'></input>";
				row.insertCell(1).innerHTML =
					`<input type='text' value=${rowCount++}></input>`;
				row.insertCell(2).innerHTML =
					"<input type='button' value=삭제></button>";
			},
			false,
		);
		document.body.addEventListener(
			"click",
			function () {
				if (event.target.matches("input[type='button'][value='삭제']")) {
					let tr = event.target.parentElement.parentElement;
					if (tr.tagName === "TR") tr.remove();
				}
			},
			false,
		);
	</script>
</html>
